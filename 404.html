<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MUTCU Tickets</title>
    <script>
      // GH Pages SPA redirect trick.
      // Encodes the full path into the query string, then index.html decodes it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />
  <title>MUTCU Film Premiere</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style type="text/css">
    /* Reset */
    * { box-sizing: border-box; }
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      .dark-bg    { background-color: #0B1D3A !important; }
      .dark-card  { background-color: #0f2347 !important; }
    }

    /* Mobile */
    @media only screen and (max-width: 600px) {
      .wrapper   { width: 100% !important; padding: 16px !important; }
      .card      { border-radius: 12px !important; }
      .hero-pad  { padding: 28px 20px !important; }
      .body-pad  { padding: 24px 20px !important; }
      .ticket-grid { display: block !important; }
      .ticket-col  { display: block !important; width: 100% !important; }
      .qr-cell   { padding-top: 16px !important; text-align: center !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#e8edf5;font-family:Georgia,'Times New Roman',serif;">

  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
    style="background-color:#e8edf5;min-width:100%;">
    <tr>
      <td align="center" style="padding:32px 16px;" class="wrapper">

        <!-- Email card — max 600px -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
          style="max-width:600px;width:100%;" class="card">

          <!-- ═══ HEADER ═══ -->
          <tr>
            <td style="
              background: linear-gradient(135deg, #0B1D3A 0%, #0f2347 50%, #0D9488 200%);
              background-color: #0B1D3A;
              border-radius: 16px 16px 0 0;
              padding: 32px 36px 28px;
              text-align: center;
              border-bottom: 3px solid #0D9488;
            " class="hero-pad">

              <!-- Emblem: 2×2 colour quadrant table -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                style="margin:0 auto 18px;border-radius:50%;overflow:hidden;
                       border:2px solid #0D9488;width:56px;height:56px;">
                <tr>
                  <td width="28" height="28" style="background-color:#E8710A;width:28px;height:28px;"></td>
                  <td width="28" height="28" style="background-color:#0D9488;width:28px;height:28px;"></td>
                </tr>
                <tr>
                  <td width="28" height="28" style="background-color:#0B1D3A;width:28px;height:28px;border-top:1px solid rgba(255,255,255,0.15);"></td>
                  <td width="28" height="28" style="background-color:#DC2626;width:28px;height:28px;border-top:1px solid rgba(255,255,255,0.15);"></td>
                </tr>
              </table>

              <!-- Brand name -->
              <div style="
                font-family: Georgia, 'Times New Roman', serif;
                font-size: 11px;
                font-weight: bold;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                color: #14b8a8;
                margin-bottom: 8px;
              ">Murang'a University of Technology CU</div>

              <h1 style="
                margin: 0;
                font-family: Georgia, 'Times New Roman', serif;
                font-size: 28px;
                font-weight: bold;
                color: #ffffff;
                letter-spacing: -0.01em;
                line-height: 1.2;
              ">Film Premiere</h1>

              <!-- Colour bar accent -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                style="margin:14px auto 0;width:80px;height:3px;border-radius:2px;overflow:hidden;">
                <tr>
                  <td style="background-color:#E8710A;width:27px;height:3px;"></td>
                  <td style="background-color:#0D9488;width:27px;height:3px;"></td>
                  <td style="background-color:#DC2626;width:26px;height:3px;"></td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- ═══ BODY CONTENT (injected by child template) ═══ -->
          <tr>
            <td style="
              background-color:#ffffff;
              padding: 36px 36px 28px;
            " class="body-pad">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- ═══ FOOTER ═══ -->
          <tr>
            <td style="
              background-color: #0B1D3A;
              border-radius: 0 0 16px 16px;
              padding: 20px 32px;
              text-align: center;
              border-top: 1px solid rgba(13,148,136,0.25);
            ">
              <p style="margin:0 0 6px;font-size:12px;color:rgba(255,255,255,0.35);
                        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
                        line-height:1.5;">
                © {{ now_year or 2025 }} MUTCU &nbsp;·&nbsp; Murang'a University of Technology
              </p>
              <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.25);
                        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
                Need help?
                <a href="tel:+254707897640"
                   style="color:#14b8a8;text-decoration:none;">Contact support</a>
                &nbsp;·&nbsp;
                <span style="color:rgba(255,255,255,0.2);">Powered by Safaricom M&#8209;Pesa</span>
              </p>
            </td>
          </tr>

        </table>
        <!-- /card -->

      </td>
    </tr>
  </table>
  <!-- /outer wrapper -->

</body>
</html>
